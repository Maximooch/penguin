name: Pull request checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-goal-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            pydantic-spec: "pydantic==1.10.24"
          - python-version: "3.12"
            pydantic-spec: "pydantic>=2,<3"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install Penguin development dependencies
        run: python -m pip install -e '.[dev]' '${{ matrix.pydantic-spec }}'
      - name: Check focused runtime modules
        run: |
          ruff check \
            penguin/core_runtime/session_goal_facade.py \
            penguin/core_runtime/session_goal_runtime.py \
            penguin/core_runtime/session_goal_store.py \
            penguin/core_runtime/session_goals.py \
            penguin/web/schemas/session_goal.py \
            penguin/web/services/session_goal.py
          ruff format --check \
            penguin/core_runtime/session_goal_facade.py \
            penguin/core_runtime/session_goal_runtime.py \
            penguin/core_runtime/session_goal_store.py \
            penguin/core_runtime/session_goals.py \
            penguin/web/schemas/session_goal.py \
            penguin/web/services/session_goal.py
      - name: Run goal, Engine, and API contracts
        run: |
          pytest -q \
            tests/core_runtime/test_session_goal_runtime.py \
            tests/core_runtime/test_session_goal_store.py \
            tests/core_runtime/test_session_goals.py \
            tests/core_runtime/test_process_lifecycle.py \
            tests/core_runtime/test_stream_events.py \
            tests/llm/test_runtime_stream_retry.py \
            tests/test_conversation_internal_visibility.py \
            tests/test_engine_task_finish_contract.py \
            tests/test_engine_run_task_thin_wrapper.py \
            tests/test_finish_task_schema_contract.py \
            tests/test_part_event_persist_callback.py \
            tests/test_runmode_project_completion.py \
            tests/test_runmode_runtime_scope.py \
            tests/api/test_opencode_command_routes.py \
            tests/api/test_opencode_session_routes.py \
            tests/api/test_sse_and_status_scoping.py \
            tests/api/test_session_view_service.py

  tui-goal-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: penguin-tui
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"
      - run: bun install --frozen-lockfile
      - name: Typecheck TUI
        working-directory: penguin-tui/packages/opencode
        run: bun run typecheck
      - name: Run goal command and session-state tests
        working-directory: penguin-tui/packages/opencode
        run: |
          bun test \
            test/cli/tui/penguin-local-command.test.ts \
            test/cli/tui/penguin-local-command-runtime.test.ts \
            test/cli/tui/prompt-penguin-send.test.ts \
            test/cli/tui/prompt-penguin-submit-gate.test.ts \
            test/tui/penguin-send.test.ts
          bun test \
            test/cli/tui/session-goal-summary.test.ts \
            test/cli/tui/sync-bootstrap.test.ts \
            test/cli/tui/sync-session-events.test.ts

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: docs/yarn.lock
      - run: corepack enable
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn build
